<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENDED</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .background-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 50%, rgba(75, 0, 130, 0.15) 0%, transparent 50%),
                        linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);
            z-index: 0;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 1.2s ease;
        }

        .video-container.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 9/16;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 90px rgba(138, 43, 226, 0.5),
                        0 0 100px rgba(75, 0, 130, 0.3);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* END SCREEN */
        .end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
            gap: 60px;
            padding: 30px;
        }

        .end-screen.show {
            opacity: 1;
            pointer-events: all;
        }

        .end-word {
            font-family: 'Playfair Display', serif;
            font-size: clamp(5em, 20vw, 14em);
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-shadow: 0 0 80px rgba(255,255,255,0.15);
            line-height: 1;
            animation: end-glow 3s ease-in-out infinite;
        }

        @keyframes end-glow {
            0%, 100% { text-shadow: 0 0 60px rgba(255,255,255,0.1); }
            50% { text-shadow: 0 0 120px rgba(255,255,255,0.25); }
        }

        .question-image {
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            box-shadow: 0 20px 80px rgba(138, 43, 226, 0.5);
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
        }

        .end-screen.show .question-image {
            opacity: 1;
            transform: translateY(0);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .video-wrapper {
                max-width: 95%;
                border-radius: 15px;
            }

            .confirmation-box {
                padding: 40px 30px;
            }

            .confirmation-text {
                font-size: 2em;
            }

            .confirm-btn {
                padding: 18px 50px;
                font-size: 1.3em;
            }

            .question-image {
                max-width: 300px;
            }
        }

        @media (max-width: 480px) {
            .confirmation-text {
                font-size: 1.8em;
                margin-bottom: 30px;
            }

            .confirm-btn {
                padding: 15px 40px;
                font-size: 1.2em;
            }

            .question-image {
                max-width: 260px;
            }
        }
    </style>
</head>
<body>
    <div class="background-gradient"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="video-container" id="videoContainer">
            <div class="video-wrapper">
                <iframe 
                    allow="autoplay; fullscreen" 
                    allowfullscreen 
                    src="https://streamable.com/e/br7kq4?autoplay=1" 
                    id="videoFrame">
                </iframe>
            </div>
        </div>

        <div class="end-screen" id="endScreen">
            <div class="end-word">ENDED</div>
            <img 
                class="question-image" 
                src="https://i.pinimg.com/736x/f5/84/2e/f5842eab07e9e807d5659d08cf00f360.jpg" 
                alt="question"
            />
        </div>
    </div>

    <script>
        // Create particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
                particle.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px');
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        createParticles();

        let videoEnded = false;

        function showEndScreen() {
            if (videoEnded) return;
            videoEnded = true;

            const videoContainer = document.getElementById('videoContainer');
            const endScreen = document.getElementById('endScreen');

            videoContainer.classList.add('fade-out');
            setTimeout(() => {
                videoContainer.style.display = 'none';
                endScreen.classList.add('show');
            }, 1200);
        }

        // Video duration (43 seconds)
        setTimeout(showEndScreen, 43000);
    </script>
</body>
</html>
